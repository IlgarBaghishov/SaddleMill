[Main]
executorlib = True
method = DoubleMinimization
dir_path = data
Optimizer = LBFGS
device = 'cpu'
Calculator = VaspInteractive
fmax = 0.5
steps = 2
zip = True
max_consecutive_errors = 0

[Vasp]
setups = minimal
ispin = 1
isym = 0
isif = 0
lreal = Auto
ediff = 0.01
nelm = 8
encut = 200.0
ismear = 0
sigma = 0.1
gga = PE
xc = PBE
pp = PBE
lwave = False
lcharg = False

[LBFGS]
maxstep = 0.1
damping = 0.99
alpha = 200

[ourDoubleMinimization]
relax_cell = False
pre_dimer_refine = False
# Sequential sides; one socket (64 cores) per VASP call.
vasp_command = "unset PMI2_FD PMI_FD PMI2_RANK PMI_RANK PMI2_SIZE PMI_SIZE PMI2_SPROUTE; I_MPI_HYDRA_BOOTSTRAP=fork mpirun -n 64 $HOME/vasp/vasp.6.4.0.1/bin/vasp_std"
vasp_ncore = 4
