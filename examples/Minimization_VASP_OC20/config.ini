[Main]
executorlib = True
method = Minimization
dir_path = data
Optimizer = LBFGS
device = 'cpu'
Calculator = VaspInteractive
fmax = 0.5
steps = 2
zip = True
max_consecutive_errors = 0
# 2 workers per node — each worker runs one Minimization at a time. The
# vasp_command below uses 64 MPI ranks per call, so two workers fill the
# full 128-core node (2 × 64). OMP_NUM_THREADS=1 keeps it pure MPI.
jobs_per_node = 2

[Vasp]
setups = minimal
ispin = 1
isym = 0
isif = 0
lreal = Auto
ediff = 0.01
nelm = 8
encut = 200.0
ismear = 0
sigma = 0.1
gga = PE
xc = PBE
pp = PBE
lwave = False
lcharg = False

[LBFGS]
maxstep = 0.1
damping = 0.99
alpha = 200

[ourMinimization]
relax_cell = False
vasp_command = "unset PMI2_FD PMI_FD PMI2_RANK PMI_RANK PMI2_SIZE PMI_SIZE PMI2_SPROUTE; I_MPI_HYDRA_BOOTSTRAP=fork OMP_NUM_THREADS=1 mpirun -n 64 $HOME/vasp/vasp.6.4.0.1/bin/vasp_std"
vasp_ncore = 4
